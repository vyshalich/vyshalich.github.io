<!DOCTYPE html>
<html>
<head>
    <title>Vyshali Chintalapati | Data Engineer</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
        }

        .hero{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:60px;
            margin-bottom:20px;
        }

        h2{
            font-size:28px;
            color:#94a3b8;
            margin-bottom:20px;
        }

        p{
            max-width:700px;
            font-size:20px;
            line-height:1.6;
            margin-bottom:40px;
        }

        .stats{
            display:flex;
            gap:40px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .card{
            padding:25px;
            border:1px solid #334155;
            border-radius:12px;
            min-width:180px;
        }

        .number{
            font-size:36px;
            font-weight:bold;
        }

        .label{
            margin-top:10px;
            color:#94a3b8;
        }
    </style>
</head>

<body>

    <section class="hero">

        <h1>Vyshali Chintalapati</h1>

        <h2>Data Engineer | BigQuery | Airflow | GCP</h2>

        <p>
            Building reliable data platforms, scalable ETL pipelines,
            and production-grade analytics systems.
        </p>

        <div class="stats">

            <div class="card">
                <div class="number">10M+</div>
                <div class="label">Records Validated</div>
            </div>

            <div class="card">
                <div class="number">20+</div>
                <div class="label">Production DAGs</div>
            </div>

            <div class="card">
                <div class="number">40%</div>
                <div class="label">Manual Effort Reduced</div>
            </div>

            <div class="card">
                <div class="number">4+</div>
                <div class="label">Years Experience</div>
            </div>

        </div>

    </section>

</body>
</html>
